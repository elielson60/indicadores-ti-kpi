name: Atualizar Painel de TI (Tom Ticket)

# Roda automaticamente todo dia às 06:00 (horário de Brasília = 09:00 UTC)
# e também permite rodar manualmente pela aba "Actions" do GitHub.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sincronizar chamados do Tom Ticket
        env:
          TOMTICKET_TOKEN: ${{ secrets.TOMTICKET_TOKEN }}
        run: python3 sync_tomticket.py

      - name: Reconstruir o painel HTML
        run: python3 build_dashboard.py

      - name: Publicar alterações (commit automático)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickets.json index.html
          git diff --staged --quiet || git commit -m "Atualização automática do painel ($(date '+%d/%m/%Y %H:%M'))"
          git push
